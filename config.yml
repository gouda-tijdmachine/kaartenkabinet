about:
  title: Over Rotterdam Tijdmachine
  closeLabel: Sluit over
  paragraphs:
    - Rotterdam Tijdmachine maakt het mogelijk om ruim 150 jaar aan Rotterdamse stadsgeschiedenis te ontdekken. Vanaf de negentiende eeuw is er veel veranderd in de manier waarop Rotterdam zich heeft ontwikkeld als stad en haven.
    - De historische kaarten laten zien hoe Rotterdam groeide van een kleine handelsstad tot een van de grootste havens ter wereld. Je ziet hoe wijken verschoven, nieuwe gebieden werden aangelegd en oude structuren verdwenen.
    - Deze cultuurhistorische tijdreis geeft inzicht in de keuzes die hebben geleid tot het Rotterdam van nu, en kan inspireren om historische kennis opnieuw te benutten.
  shortcutsTitle: Sneltoetsen
  shortcuts:
    - keys: ["⌘", K, "/", Ctrl, K]
      description: Kaartlagen openen
    - keys: ["↑", "↓"]
      description: Naar het volgende of vorige beschikbare kaartjaar
    - keys: ["←", "→"]
      description: Door kaarten van hetzelfde jaar bladeren
    - keys: ["+", "=", "-"]
      description: In- en uitzoomen
    - keys: [Shift, "←", "↑", "↓", "→"]
      description: Kaartbeeld verschuiven
    - keys: [F]
      description: Filter op kaarten in beeld aan- of uitzetten
    - keys: [R]
      description: Kaartoriëntatie volgen aan- of uitzetten
    - keys: [Z]
      description: Kaartlaagfocus volgen aan- of uitzetten
