about:
  title: Over Goudse Kaarten Kabinet
  closeLabel: Sluit over
  paragraphs:
    - De Gouda Tijdmachine verzamelt ook kaarten van Gouda om de stadsgeschiedenis te ontdekken. Vanaf de zestiende eeuw zijn er kaarten beschikbaar van deze havenstad.
    - De historische Goudse kaarten zijn afkomstig uit de collectie van het Streekarchief Midden-Holland en andere erfgoedinstellingen. Vrijwilligers van de Gouda Tijdmachine hebben deze kaarten gegeorefereerd met behulp van Allmaps, zodat ze in de tijdmachine kunnen worden bekeken.
    - Deze cultuurhistorische tijdreis geeft inzicht in de keuzes die hebben geleid tot het Gouda van nu, en kan inspireren om historische kennis opnieuw te benutten.
  standards:
    title: Kaarten verbinden
    paragraphs:
      - De kaarten in deze tijdmachine komen uit collecties van verschillende instellingen. Dankzij de open standaard IIIF kunnen kaartbeelden en metadata op een uniforme manier worden gepubliceerd, opgehaald en hergebruikt.
      - Met de open-source tooling van Allmaps worden historische kaartbeelden gekoppeld aan geografische coördinaten. Daardoor kunnen kaarten uit verschillende bronnen als lagen op dezelfde moderne kaart worden gelegd, vergeleken en gedeeld.
    links:
      - label: IIIF
        url: https://iiif.io/
      - label: Allmaps
        url: https://allmaps.org/
  institutionsTitle: Kaartbronnen
  source:
    title: Open source
    description: Rotterdam Tijdmachine is een open-source project. De broncode is beschikbaar op GitHub.
    linkLabel: Bekijk de code op GitHub
    url: https://github.com/allmaps/rotterdam-tijdmachine
  shortcutsTitle: Sneltoetsen
  shortcuts:
    - keys: ["⌘", K, "/", Ctrl, K]
      description: Kaartlagen openen
    - keys: ["↑", "↓"]
      description: Naar het volgende of vorige beschikbare kaartjaar
    - keys: ["←", "→"]
      description: Door kaarten van hetzelfde jaar bladeren
    - keys: ["+", "=", "-"]
      description: In- en uitzoomen
    - keys: [Shift, "←", "↑", "↓", "→"]
      description: Kaartbeeld verschuiven
    - keys: [F]
      description: Filter op kaarten in beeld aan- of uitzetten
    - keys: [R]
